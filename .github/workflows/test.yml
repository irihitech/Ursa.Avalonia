name: Test

on:
  push:
    branches: [ "main", "2.0.0*" ]
  pull_request:
    branches: [ "main", "2.0.0*" ]
  workflow_dispatch:
    
permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.201
      - name: Ursa Unit Test
        run: dotnet test tests/Test.Ursa
      - name: Ursa Headless Test
        run: dotnet test tests/HeadlessTest.Ursa

  ubuntu:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.201
      - name: Unit Test
        run: dotnet test tests/Test.Ursa --configuration Release  -- --coverage --coverage-output-format cobertura --coverage-output coverage.cobertura.xml
      - name: Ursa Headless Test
        run: dotnet test tests/HeadlessTest.Ursa --configuration Release  -- --coverage --coverage-output-format cobertura --coverage-output coverage.cobertura.xml
      - name: Combine Coverage Reports # This is because one report is produced per project, and we want one result for all of them.
        uses: danielpalme/ReportGenerator-GitHub-Action@v5
        with:
          reports: '**/*.cobertura.xml' # REQUIRED # The coverage reports that should be parsed (separated by semicolon). Globbing is supported.
          targetdir: "${{ github.workspace }}" # REQUIRED # The directory where the generated report should be saved.
          reporttypes: 'HtmlInline;Cobertura'
      - name: Publish Code Coverage Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: "Cobertura.xml"
          badge: true
          fail_below_min: false # just informative for now
          format: markdown
          hide_branch_rate: false
          hide_complexity: false
          indicators: true
          output: both
          thresholds: "10 30"
      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v3
        if: (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        with:
          recreate: true
          path: code-coverage-results.md
      - name: Upload Test Result Files
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            ${{ github.workspace }}/**/TestResults/**/* 
            ${{ github.workspace }}/**/CoverageReports/**/* 
          retention-days: 5
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          trx_files: "${{ github.workspace }}/**/*.trx"
